simpleArgs: &simple-args
  tokenId: 200

test:
  name: Update Transaction Order Revert Test
  description: "Test revert functionality when update transactions are submitted out of order to update.sol"
  workers:
    number: 1
  rounds:
    - label: safeMint
      description: "Mint initial NFT with version 1"
      txNumber: 10
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: benchmarks/scenario/updateTransaction/safeMint.js
        arguments:
          << : *simple-args
      callback:
        module: benchmarks/scenario/updateTransaction/utils/interval-callback.js
      sleepAfterRound: 20
    - label: update-success-v2
      description: "Update with correct version 2 (should succeed)"
      txNumber: 10
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: benchmarks/scenario/updateTransaction/update-version.js
        arguments:
          << : *simple-args
          version: 2
          suffix: "v2-success"
      callback:
        module: benchmarks/scenario/updateTransaction/utils/interval-callback.js
